name: Forward-push to main for Vercel

on:
  push:
    branches: [claude/serene-euler-ytywcb]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Create forward commit on main
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"

          # Stamp version.txt so the tree always differs — Vercel skips builds
          # with an identical tree to the last deployment.
          echo "$(date -u +%Y%m%d-%H%M%S)" > public/version.txt
          git add public/version.txt

          TREE=$(git write-tree)
          MSG=$(git log -1 --format=%s)

          git fetch origin main
          PARENT=$(git rev-parse origin/main)

          NEW_COMMIT=$(git commit-tree "$TREE" -p "$PARENT" -m "$MSG")
          git push https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/itsjamaspage/daromadchi.git "${NEW_COMMIT}:refs/heads/main"
