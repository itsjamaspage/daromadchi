name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'bash -s' <<'DEPLOY'
          set -e
          cd /var/www/daromadchi
          echo "Resetting working tree to latest main..."
          git merge --abort 2>/dev/null || true
          git rebase --abort 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          echo "Installing dependencies..."
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          echo "Building..."
          npm run build
          echo "Restarting app..."
          pm2 restart daromadchi
          echo "Deploy complete."
          DEPLOY
