name: Deploy to Vercel
# Disabled — Vercel CLI deploys count against the 100/day API quota on the free tier.
# Deployments are triggered via the native Vercel GitHub integration instead,
# which uses a separate (unthrottled) path. To trigger a deploy, push any
# forward commit to main (e.g. update public/version.txt via the GitHub API).

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Link and deploy
        run: |
          vercel link --yes --token $VERCEL_TOKEN --scope auralook --project daromadchi
          vercel --prod --yes --token $VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
