name: Deploy to Vercel
# Disabled — using native Vercel GitHub integration instead.
# This workflow was burning the 100 deployments/day free tier limit
# by firing on every push (including rebase force-pushes).

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Link and deploy
        run: |
          vercel link --yes --token $VERCEL_TOKEN --scope auralook --project daromadchi
          vercel --prod --yes --token $VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
