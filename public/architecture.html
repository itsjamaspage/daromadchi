<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daromadchi Architecture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: #475569;
            --accent-blue: #3b82f6;
            --accent-blue-light: #93c5fd;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --hover-bg: #1e293b;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-tertiary: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #cbd5e1;
            --accent-blue: #2563eb;
            --accent-blue-light: #bfdbfe;
            --hover-bg: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Navigation Bar */
        .navbar {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            min-height: 70px;
        }

        .navbar-title {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            color: var(--accent-blue);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 0.5rem 1rem;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .search-box::placeholder {
            color: var(--text-secondary);
        }

        .navbar-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            padding: 0.25rem;
            background-color: var(--bg-tertiary);
        }

        .btn {
            padding: 0.375rem 0.875rem;
            border: none;
            background-color: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.75rem;
            border-radius: 0.25rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: var(--hover-bg);
            color: var(--text-primary);
        }

        .btn.active {
            background-color: var(--accent-blue);
            color: white;
        }

        .theme-toggle {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            padding: 0.375rem 0.875rem;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background-color: var(--hover-bg);
            color: var(--text-primary);
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar Left */
        .sidebar-left {
            width: 250px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem;
            overflow-y: auto;
            font-size: 0.875rem;
        }

        .legend-section {
            margin-bottom: 2rem;
        }

        .legend-title {
            font-weight: bold;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .stats-section {
            margin-bottom: 2rem;
            padding: 1rem;
            background-color: var(--bg-tertiary);
            border-radius: 0.375rem;
            border: 1px solid var(--border-color);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-value {
            color: var(--accent-blue);
            font-weight: bold;
        }

        .component-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .component-link {
            padding: 0.5rem;
            background-color: var(--bg-tertiary);
            border-left: 2px solid transparent;
            cursor: pointer;
            border-radius: 0.25rem;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .component-link:hover {
            background-color: var(--hover-bg);
            border-left-color: var(--accent-blue);
            color: var(--text-primary);
        }

        /* Canvas */
        .canvas {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: var(--bg-primary);
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .component-box {
            cursor: pointer;
            transition: all 0.2s;
        }

        .component-box:hover rect {
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
        }

        .component-box.highlight rect {
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.8));
            stroke-width: 3;
        }

        .component-box.connected rect {
            opacity: 0.6;
        }

        .component-box.dimmed rect,
        .component-box.dimmed text {
            opacity: 0.3;
        }

        /* Sidebar Right */
        .sidebar-right {
            width: 320px;
            background-color: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            padding: 1.5rem;
            overflow-y: auto;
            display: none;
            flex-direction: column;
        }

        .sidebar-right.active {
            display: flex;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .detail-title {
            font-weight: bold;
            font-size: 1.125rem;
            color: var(--text-primary);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .detail-section {
            margin-bottom: 1.5rem;
        }

        .detail-label {
            font-weight: bold;
            color: var(--accent-blue);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .detail-content {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .status-complete {
            background-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid #10b981;
        }

        .status-progress {
            background-color: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 1px solid #f59e0b;
        }

        .status-not-started {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .tech-tag {
            background-color: var(--bg-tertiary);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            border: 1px solid var(--border-color);
            font-size: 0.7rem;
            font-family: "Courier New", monospace;
            color: var(--accent-blue);
        }

        .connection-item {
            background-color: var(--bg-tertiary);
            padding: 0.5rem;
            border-radius: 0.25rem;
            border-left: 2px solid var(--accent-blue);
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }

        .connection-type {
            color: var(--accent-blue);
            font-weight: bold;
            font-size: 0.7rem;
        }

        .connection-desc {
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .issue-item {
            background-color: rgba(239, 68, 68, 0.1);
            padding: 0.5rem;
            border-radius: 0.25rem;
            border-left: 2px solid #ef4444;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }

        .step-item {
            background-color: rgba(59, 130, 246, 0.1);
            padding: 0.5rem;
            border-radius: 0.25rem;
            border-left: 2px solid var(--accent-blue);
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }

        .sidebar-left::-webkit-scrollbar,
        .sidebar-right::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-left::-webkit-scrollbar-track,
        .sidebar-right::-webkit-scrollbar-track {
            background-color: var(--bg-secondary);
        }

        .sidebar-left::-webkit-scrollbar-thumb,
        .sidebar-right::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }

        .sidebar-left::-webkit-scrollbar-thumb:hover,
        .sidebar-right::-webkit-scrollbar-thumb:hover {
            background-color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="navbar-title">DAROMADCHI / ARCHITECTURE</div>
            <input type="text" class="search-box" id="searchBox" placeholder="Search components...">
            <div class="navbar-controls">
                <div class="btn-group" id="statusFilter">
                    <button class="btn active" data-filter="all">All</button>
                    <button class="btn" data-filter="complete">Complete ✓</button>
                    <button class="btn" data-filter="progress">In Progress ⏳</button>
                    <button class="btn" data-filter="not-started">Not Started</button>
                </div>
                <div class="btn-group" id="layerFilter">
                    <button class="btn active" data-layer="all">All Layers</button>
                    <button class="btn" data-layer="frontend">Frontend</button>
                    <button class="btn" data-layer="backend">Backend</button>
                    <button class="btn" data-layer="database">Database</button>
                    <button class="btn" data-layer="external">External</button>
                    <button class="btn" data-layer="infra">Infra</button>
                </div>
                <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar-left">
                <div class="legend-section">
                    <div class="legend-title">Status Legend</div>
                    <div class="legend-item">
                        <div class="legend-dot" style="background-color: #10b981;"></div>
                        <span>Complete</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot" style="background-color: #f59e0b;"></div>
                        <span>In Progress</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot" style="background-color: #ef4444;"></div>
                        <span>Not Started</span>
                    </div>
                </div>

                <div class="stats-section">
                    <div class="legend-title">System Stats</div>
                    <div class="stat-item">
                        <span>Components</span>
                        <span class="stat-value">12</span>
                    </div>
                    <div class="stat-item">
                        <span>Connections</span>
                        <span class="stat-value">28</span>
                    </div>
                    <div class="stat-item">
                        <span>Layers</span>
                        <span class="stat-value">5</span>
                    </div>
                    <div class="stat-item">
                        <span>Active Phase</span>
                        <span class="stat-value">3</span>
                    </div>
                </div>

                <div class="legend-section">
                    <div class="legend-title">Components</div>
                    <div class="component-links" id="componentLinks"></div>
                </div>
            </div>

            <div class="canvas">
                <svg id="diagramSvg" viewBox="0 0 1600 900"></svg>
            </div>

            <div class="sidebar-right" id="detailsPanel">
                <div class="detail-header">
                    <div class="detail-title" id="detailTitle"></div>
                    <button class="close-btn" onclick="closeDetails()">✕</button>
                </div>
                <div id="detailsContent"></div>
            </div>
        </div>
    </div>

    <script>
        const components = [
            {
                id: "web-app",

            },
            {

                x: 400, y: 280,

                tech: ["Node.js", "Next.js API Routes", "TypeScript"],
                connections: [
                    { target: "web-app", type: "serve", desc: "API responses" },
                    { target: "chrome-ext", type: "serve", desc: "Extension data" },
                    { target: "postgres", type: "storage", desc: "CRUD operations" },
                    { target: "uzum", type: "fetch", desc: "Market data" },

                    { target: "nextauth", type: "storage", desc: "Session storage" }
                ],
                issues: [],
                nextSteps: ["Add read replicas", "Implement partitioning"]
            },
            {

                name: "Uzum Market API",
                layer: "external",
                status: "complete",
                x: 800, y: 100,
                description: "Read-only API for Uzum marketplace data",
                tech: ["REST API", "OAuth", "Marketplace"],
                connections: [
                    { target: "api-routes", type: "fetch", desc: "Sales & inventory" }
                ],

                nextSteps: ["Migrate to Uzum API v2", "Add webhook support"]
            },
            {
                id: "wildberries",
                name: "Wildberries API",
                layer: "external",
                status: "complete",
                x: 800, y: 260,
                description: "Read-only API for Wildberries sales data",
                tech: ["REST API", "Token auth", "Marketplace"],
                connections: [
                    { target: "api-routes", type: "fetch", desc: "Orders & analytics" }
                ],
                issues: ["Complex pricing structure"],
                nextSteps: ["Add FBW/FBS caching", "Price history"]
            },
            {
                id: "yandex",
                name: "Yandex Market API",
                layer: "external",
                status: "complete",
                x: 800, y: 420,
                description: "Read-only API for Yandex Market data",
                tech: ["REST API", "OAuth", "Marketplace"],
                connections: [
                    { target: "api-routes", type: "fetch", desc: "Sales & stock" }
                ],
                issues: ["Occasional API instability"],
                nextSteps: ["Add fallback caching", "Retry logic"]
            },
            {
                id: "resend",
                name: "Resend (Email)",
                layer: "external",
                status: "progress",
                x: 800, y: 580,
                description: "Email service for notifications and reports",
                tech: ["Resend API", "Email templates"],
                connections: [
                    { target: "api-routes", type: "send", desc: "Send emails" }
                ],
                issues: ["Email templates need refinement"],
                nextSteps: ["Implement scheduled reports", "Add analytics"]
            },
            {
                id: "hetzner",
                name: "Hetzner VPS",
                layer: "infra",
                status: "complete",
                x: 1200, y: 350,
                description: "Self-hosted infrastructure running all services",
                tech: ["Ubuntu 22.04", "Docker", "systemd"],
                connections: [
                    { target: "github", type: "deploy", desc: "CI/CD from GitHub" }
                ],
                issues: ["Monitor CPU/memory usage"],
                nextSteps: ["Upgrade instance size", "Add load balancer"]
            },
            {
                id: "github",
                name: "GitHub",
                layer: "infra",
                status: "complete",
                x: 1200, y: 550,
                description: "Version control and CI/CD pipeline",
                tech: ["Git", "GitHub Actions", "Docker"],
                connections: [
                    { target: "hetzner", type: "deploy", desc: "Deploy on push" }
                ],
                issues: [],
                nextSteps: ["Add security scanning", "Automated testing"]
            }
        ];

        let currentTheme = localStorage.getItem("theme") || "dark";
        let selectedComponent = null;
        let currentStatusFilter = "all";
        let currentLayerFilter = "all";
        let searchQuery = "";

        document.addEventListener("DOMContentLoaded", () => {
            setTheme(currentTheme);
            renderDiagram();
            populateComponentLinks();
            setupEventListeners();
        });

        function setTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("theme", theme);
            const themeToggle = document.getElementById("themeToggle");
            themeToggle.textContent = theme === "dark" ? "☀️ Light" : "🌙 Dark";
        }

        document.getElementById("themeToggle").addEventListener("click", () => {
            setTheme(currentTheme === "dark" ? "light" : "dark");
        });

        function setupEventListeners() {
            document.getElementById("searchBox").addEventListener("input", (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderDiagram();
            });

            document.getElementById("statusFilter").addEventListener("click", (e) => {
                if (e.target.classList.contains("btn")) {
                    document.querySelectorAll("#statusFilter .btn").forEach(b => b.classList.remove("active"));
                    e.target.classList.add("active");
                    currentStatusFilter = e.target.dataset.filter;
                    renderDiagram();
                }
            });

            document.getElementById("layerFilter").addEventListener("click", (e) => {
                if (e.target.classList.contains("btn")) {
                    document.querySelectorAll("#layerFilter .btn").forEach(b => b.classList.remove("active"));
                    e.target.classList.add("active");
                    currentLayerFilter = e.target.dataset.layer;
                    renderDiagram();
                }
            });
        }

        function populateComponentLinks() {
            const container = document.getElementById("componentLinks");
            container.innerHTML = components.map(c => `
                <div class="component-link" onclick="selectComponent('${c.id}')">
                    <span style="color: ${getStatusColor(c.status)};">●</span> ${c.name}
                </div>
            `).join("");
        }

        function getStatusColor(status) {
            const colors = { complete: "#10b981", progress: "#f59e0b", "not-started": "#ef4444" };
            return colors[status] || "#94a3b8";
        }

        function shouldShowComponent(component) {
            const matchesSearch = component.name.toLowerCase().includes(searchQuery) ||
                component.id.toLowerCase().includes(searchQuery);
            const matchesStatus = currentStatusFilter === "all" || component.status === currentStatusFilter;
            const matchesLayer = currentLayerFilter === "all" || component.layer === currentLayerFilter;
            return matchesSearch && matchesStatus && matchesLayer;
        }

        function renderDiagram() {
            const svg = document.getElementById("diagramSvg");
            svg.innerHTML = "";

            const visibleComponents = components.filter(shouldShowComponent);
            const visibleIds = new Set(visibleComponents.map(c => c.id));

            components.forEach(comp => {
                if (!visibleIds.has(comp.id)) return;
                comp.connections.forEach(conn => {
                    if (!visibleIds.has(conn.target)) return;
                    const target = components.find(c => c.id === conn.target);
                    drawConnection(svg, comp, target, conn.type);
                });
            });

            visibleComponents.forEach(comp => {
                drawComponent(svg, comp);
            });
        }

        function drawConnection(svg, from, to, type) {
            const x1 = from.x + 75;
            const y1 = from.y + 50;
            const x2 = to.x + 75;
            const y2 = to.y + 50;

            const midX = (x1 + x2) / 2;
            const midY = (y1 + y2) / 2;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", `M ${x1} ${y1} Q ${midX} ${midY - 50} ${x2} ${y2}`);
            path.setAttribute("stroke", type === "auth" ? "#8b5cf6" : type === "storage" ? "#06b6d4" : "#64748b");
            path.setAttribute("stroke-width", "2");
            path.setAttribute("fill", "none");
            path.setAttribute("class", `connection connection-${from.id} connection-${to.id}`);

            svg.appendChild(path);
        }

        function drawComponent(svg, comp) {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "component-box");
            g.setAttribute("data-id", comp.id);
            g.onclick = () => selectComponent(comp.id);

            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", comp.x);
            rect.setAttribute("y", comp.y);
            rect.setAttribute("width", "150");
            rect.setAttribute("height", "100");
            rect.setAttribute("rx", "8");
            rect.setAttribute("fill", "var(--bg-tertiary)");
            rect.setAttribute("stroke", getStatusColor(comp.status));
            rect.setAttribute("stroke-width", "2");

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", comp.x + 75);
            text.setAttribute("y", comp.y + 35);
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("font-size", "12");
            text.setAttribute("font-weight", "bold");
            text.setAttribute("fill", "var(--text-primary)");
            text.textContent = comp.name;

            const status = document.createElementNS("http://www.w3.org/2000/svg", "text");
            status.setAttribute("x", comp.x + 75);
            status.setAttribute("y", comp.y + 65);
            status.setAttribute("text-anchor", "middle");
            status.setAttribute("font-size", "10");
            status.setAttribute("fill", getStatusColor(comp.status));
            status.textContent = comp.status === "complete" ? "✓ Complete" : comp.status === "progress" ? "⏳ In Progress" : "● Not Started";

            g.appendChild(rect);
            g.appendChild(text);
            g.appendChild(status);
            svg.appendChild(g);
        }

        function selectComponent(componentId) {
            selectedComponent = componentId;
            const comp = components.find(c => c.id === componentId);
            showDetails(comp);
        }

        function showDetails(comp) {
            const panel = document.getElementById("detailsPanel");
            document.getElementById("detailTitle").textContent = comp.name;

            const statusClass = `status-${comp.status === "complete" ? "complete" : comp.status === "progress" ? "progress" : "not-started"}`;
            const statusText = comp.status === "complete" ? "✓ Complete" : comp.status === "progress" ? "⏳ In Progress" : "● Not Started";

            let html = `
                <div class="detail-section">
                    <div class="detail-label">Description</div>
                    <div class="detail-content">${comp.description}</div>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                </div>

                <div class="detail-section">
                    <div class="detail-label">Technology Stack</div>
                    <div class="tech-stack">
                        ${comp.tech.map(t => `<div class="tech-tag">${t}</div>`).join("")}
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-label">Connections (${comp.connections.length})</div>
                    ${comp.connections.map(conn => {
                        const target = components.find(c => c.id === conn.target);
                        return `<div class="connection-item">
                            <div class="connection-type">${target.name}</div>
                            <div class="connection-desc">${conn.desc}</div>
                        </div>`;
                    }).join("")}
                </div>
            `;

            if (comp.issues.length > 0) {
                html += `<div class="detail-section">
                    <div class="detail-label">Known Issues</div>
                    ${comp.issues.map(issue => `<div class="issue-item">${issue}</div>`).join("")}
                </div>`;
            } else {
                html += `<div class="detail-section">
                    <div class="detail-label">Known Issues</div>
                    <div class="detail-content">None</div>
                </div>`;
            }

            html += `<div class="detail-section">
                <div class="detail-label">Next Steps</div>
                ${comp.nextSteps.map(step => `<div class="step-item">${step}</div>`).join("")}
            </div>`;

            document.getElementById("detailsContent").innerHTML = html;
            panel.classList.add("active");
        }

        function closeDetails() {
            document.getElementById("detailsPanel").classList.remove("active");
            selectedComponent = null;
        }
    </script>
</body>
</html>
