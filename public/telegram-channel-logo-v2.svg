<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0d1128"/>
    </linearGradient>
    <linearGradient id="dgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c7d8ff"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="107" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="3"/>

  <!-- Big D letter -->
  <text x="256" y="330"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="310"
    text-anchor="middle"
    fill="url(#dgrad)"
    filter="url(#shadow)"
    letter-spacing="-8">D</text>

  <!-- Badge circle (top-right) -->
  <circle cx="384" cy="128" r="52" fill="url(#badge)" filter="url(#glow)"/>
  <circle cx="384" cy="128" r="52" fill="none" stroke="#0d1128" stroke-width="6"/>

  <!-- Checkmark inside badge -->
  <polyline points="362,128 378,144 408,112"
    fill="none" stroke="#ffffff" stroke-width="10"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
