<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <ellipse cx="16" cy="3" rx="11" ry="5" fill="white" fill-opacity="0.10"/>

  <!-- D letter — outer shape -->
  <path d="M7 7 L7 25 L15 25 C21.6 25 25 21.3 25 16 C25 10.7 21.6 7 15 7 Z" fill="white"/>

  <!-- D letter — inner cutout matching background -->
  <path d="M11 11 L14.5 11 C18.8 11 20.8 13.1 20.8 16 C20.8 18.9 18.8 21 14.5 21 L11 21 Z" fill="url(#bg)"/>

  <!-- Ornament: 4-pointed sparkle top-right -->
  <path d="M26 5 L26.6 7 L28.6 7.6 L26.6 8.2 L26 10.2 L25.4 8.2 L23.4 7.6 L25.4 7 Z"
    fill="white" fill-opacity="0.92"/>

  <!-- Small accent dot below sparkle -->
  <circle cx="26" cy="13.5" r="1.1" fill="white" fill-opacity="0.45"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="55%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
</svg>
